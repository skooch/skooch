model = "gpt-5.4-mini"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
approval_policy = "on-request"
sandbox_mode = "danger-full-access"
allow_login_shell = true
notify = [
    "/Users/skooch/.codex/hooks/run-with-python3",
    "/Users/skooch/.codex/hooks/permission_bridge.py",
    "notify",
]

# Irrelevant because sandbox is in danger-full-access
# [sandbox_workspace_write]
# network_access = true
# exclude_tmpdir_env_var = false
# exclude_slash_tmp = false
# writable_roots = ["/tmp", "/Users/skooch/.codex", "/Users/skooch/projects"]

[features]
codex_hooks = true
shell_snapshot = true

# Shell-first mise setup:
# Codex shells should inherit `mise` from shell startup (~/.zshenv runtime)
# and shell snapshots instead of relying on per-command wrapper approvals.

[projects."/Users/skooch/projects/tdeck-pro-rust/tdeck-pro-rust"]
trust_level = "trusted"

[projects."/Users/skooch"]
trust_level = "trusted"

[mcp_servers.tdeck]
command = "/Users/skooch/.local/bin/tdeck"
args = ["mcp"]

# Approve every currently exposed tdeck MCP tool.

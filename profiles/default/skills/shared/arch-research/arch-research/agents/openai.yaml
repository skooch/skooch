interface:
  display_name: "arch-research"
  short_description: "Research one external OS / RTOS / runtime / historical system at a time and produce a comparison document at docs/architecture/comparisons/<os>.md that catalogs ideas worth adopting into the current codebase. Use whenever the user asks to research, compare, or learn from an external system — Zephyr, FreeRTOS, esp-rtos, PalmOS, Newton, Hubris, Tock, Fuchsia, Mach, AmigaOS, BeOS, RISC OS, Pebble, or any other runtime/OS — including phrasings like "what can we learn from X", "how does X handle Y", "do a Pebble comparison", or "fill in comparisons/freertos.md". Also use when the user points at a comparisons/todo.md entry and says "do this one". Works across projects by detecting stack context from the invoking repo's CLAUDE.md rather than baking in a specific platform. Produces a grounded doc with a "Where We Already Match or Beat X" table and tiered "Ideas Worth Stealing" entries, each classified adopt / translate / keep / skip / ask."
  default_prompt: "Use $arch-research to run the arch-research workflow."
